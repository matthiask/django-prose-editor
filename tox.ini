[tox]
envlist =
    py{310,311,312}-dj{42,50}
    py{312,313}-dj{51,52,main}

[testenv]
usedevelop = true
extras = all,tests
setenv =
    DJANGO_SETTINGS_MODULE=testapp.settings
    PYTHONPATH={toxinidir}
    DJANGO_ALLOW_ASYNC_UNSAFE=true
commands =
    python -Wd -m pytest -xvs {posargs:tests/testapp/test_prose_editor.py} --cov=django_prose_editor --cov-report=term-missing
    coverage report -m
deps =
    dj42: Django>=4.2,<5.0
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2a1,<6.0
    djmain: https://github.com/django/django/archive/main.tar.gz

[testenv:playwright]
usedevelop = true
extras = all,tests
setenv =
    DJANGO_SETTINGS_MODULE=testapp.settings
    PYTHONPATH={toxinidir}
    DJANGO_ALLOW_ASYNC_UNSAFE=true
    PYTEST_ADDOPTS=--no-header --tb=native
passenv =
    DISPLAY
    XAUTHORITY
    HOME
    CI
    GITHUB_*
commands =
    python scripts/setup_playwright.py
    python -Wd -m pytest -xvs {posargs:tests/testapp/test_playwright.py} --browser chromium

[testenv:docs]
deps =
    -r docs/requirements.txt
changedir = docs
commands = make html
skip_install = true
allowlist_externals = make
